<script type="text/babel">
const { useState } = React;

const C = {
  primary: "#024ad8", primarySoft: "#c9e0fc",
  canvas: "#ffffff", cloud: "#f7f7f7", fog: "#e8e8e8",
  steel: "#c2c2c2", ink: "#1a1a1a", onInk: "#ffffff",
  charcoal: "#3d3d3d", graphite: "#636363",
  bloomCoral: "#ff5050", bloomRose: "#f9d4d2",
  gemini: "#1a73e8", geminiSoft: "#e8f0fe",
};
const R = { md: 4, lg: 8, xl: 16, pill: 9999 };
const softLift = "0 2px 8px rgba(26,26,26,0.08)";

const TYPES = {
  claims_review:      { label: "Claims Review",      context: "You are a Claims Operations Analyst at If Insurance (Nordic Claims Unit). Extract precise, actionable information from this claims review meeting." },
  executive_briefing: { label: "Executive Briefing", context: "You are an Executive Assistant at If Insurance. Extract key decisions, actions, and strategic points from this executive briefing." },
  team_standup:       { label: "Team Standup",       context: "You are a Team Coordinator at If Insurance. Extract blockers, progress updates, and next steps from this team standup." }
};

const STATUS = {
  confirmed: { bg: C.primarySoft, color: C.primary,  border: C.primary,    label: "Confirmed" },
  pending:   { bg: C.bloomRose,   color: "#b3262b",   border: C.bloomCoral, label: "Pending"   },
  deferred:  { bg: C.fog,         color: C.charcoal,  border: C.steel,      label: "Deferred"  }
};

const SYSTEM_PROMPT = (ctx) => `${ctx}

Analyse meeting transcripts and return structured JSON only. No markdown, no explanation, no preamble.

Required JSON format:
{
  "summary": "4-5 sentences covering main topics, key context, and overall outcome of the meeting",
  "decisions": [{"decision": "clear description", "status": "confirmed|pending|deferred"}],
  "action_items": [{"task": "specific task", "owner": "person responsible", "due_date": "date or Not specified"}],
  "follow_up_dates": ["specific dates or scheduled meetings mentioned"]
}

Status: confirmed = decided and agreed, pending = under discussion, deferred = postponed.
Return [] for any section with no data.`;

/* ── API CALLS ─────────────────────────────────────────────────── */
function detectProvider(key) {
  return key.trim().startsWith("sk-ant-") ? "anthropic" : "gemini";
}

async function callAnthropic(apiKey, systemPrompt, userContent) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userContent }]
    })
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.error?.message || `Anthropic API error ${res.status}`); }
  const data = await res.json();
  return (data?.content?.find(b => b.type === "text")?.text || "").replace(/```json|```/g, "").trim();
}

async function callGemini(apiKey, systemPrompt, userContent) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `${systemPrompt}\n\n${userContent}` }] }],
        generationConfig: { responseMimeType: "application/json" }
      })
    }
  );
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.error?.message || `Gemini API error ${res.status}`); }
  const data = await res.json();
  return (data?.candidates?.[0]?.content?.parts?.[0]?.text || "").replace(/```json|```/g, "").trim();
}

async function callAI(apiKey, systemPrompt, userContent) {
  return detectProvider(apiKey) === "anthropic"
    ? callAnthropic(apiKey, systemPrompt, userContent)
    : callGemini(apiKey, systemPrompt, userContent);
}

/* ── COMPONENTS ─────────────────────────────────────────────────── */
function Card({ children, style = {} }) {
  return <div style={{ background: C.canvas, borderRadius: R.xl, boxShadow: softLift, padding: 24, ...style }}>{children}</div>;
}
function Eyebrow({ children }) {
  return <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: C.graphite, margin: "0 0 10px" }}>{children}</p>;
}
function SectionHead({ label, count, copyText }) {

    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>

      {copyText !== undefined && <CopyBtn text={copyText} />}

}
function CopyBtn({ text }) {
  const [done, setDone] = useState(false);
  return (
    <button onClick={() => { navigator.clipboard.writeText(text); setDone(true); setTimeout(() => setDone(false), 1800); }} style={{
      background: C.canvas, color: done ? C.primary : C.charcoal,
      border: `1px solid ${done ? C.primary : C.steel}`,
      borderRadius: R.md, padding: "4px 12px", fontSize: 11,
      fontWeight: 600, letterSpacing: "0.5px", textTransform: "uppercase",
      cursor: "pointer", fontFamily: "inherit"
    }}>{done ? "Copied" : "Copy"}</button>
  );
}

/* ── APP ─────────────────────────────────────────────────────────── */

/* EXPORT FUNCTIONS */
function getFilename(ext) {
  const d = new Date();
  const date = d.toISOString().split('T')[0];
  return 'claims-meeting-summary-' + date + '.' + ext;
}

function exportDocx(output, meetingType) {
  const {
    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    HeadingLevel, AlignmentType, BorderStyle, WidthType, ShadingType
  } = window.docx;

  const H = (text) => new Paragraph({
    children: [new TextRun({ text, bold: true, size: 28, color: '1a1a1a' })],
    spacing: { before: 320, after: 120 },
    border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: '024ad8', space: 2 } }
  });

  const body = (text, opts = {}) => new Paragraph({
    children: [new TextRun({ text, size: 22, color: '3d3d3d', ...opts })],
    spacing: { after: 80 }
  });

  const bullet = (text) => new Paragraph({
    children: [new TextRun({ text: '• ' + text, size: 22, color: '3d3d3d' })],
    spacing: { after: 60 },
    indent: { left: 360 }
  });

  const badge = (status) => {
    const colors = { confirmed: '024ad8', pending: 'b3262b', deferred: '636363' };
    return new TextRun({ text: '[' + (status || 'pending').toUpperCase() + '] ', bold: true, color: colors[status] || '636363', size: 20 });
  };

  const children = [
    new Paragraph({ children: [new TextRun({ text: 'Claims Meeting Summary', bold: true, size: 40, color: '1a1a1a' })], spacing: { after: 80 } }),
    new Paragraph({ children: [new TextRun({ text: meetingType + ' · ' + new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }), size: 20, color: '636363', italics: true })], spacing: { after: 240 } }),
    H('Summary'),
    body(output.summary),
    H('Decisions'),
    ...(output.decisions && output.decisions.length
      ? output.decisions.map(d => new Paragraph({ children: [badge(d.status), new TextRun({ text: d.decision, size: 22, color: '3d3d3d' })], spacing: { after: 60 }, indent: { left: 360 } }))
      : [body('No decisions recorded.')]),
    H('Action Items'),
    ...(output.action_items && output.action_items.length
      ? [new Table({
          width: { size: 100, type: WidthType.PERCENTAGE },
          rows: [
            new TableRow({ children: [
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: 'Task', bold: true, size: 20, color: '636363' })] })], shading: { type: ShadingType.SOLID, color: 'f7f7f7' } }),
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: 'Owner', bold: true, size: 20, color: '636363' })] })], shading: { type: ShadingType.SOLID, color: 'f7f7f7' } }),
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: 'Due Date', bold: true, size: 20, color: '636363' })] })], shading: { type: ShadingType.SOLID, color: 'f7f7f7' } }),
            ]}),
            ...output.action_items.map(a => new TableRow({ children: [
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: a.task, size: 20, color: '3d3d3d' })] })] }),
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: a.owner || 'Unassigned', size: 20, color: '024ad8', bold: true })] })] }),
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: a.due_date, size: 20, color: '636363' })] })] }),
            ]}))
          ]
        })]
      : [body('No action items recorded.')]),
    H('Follow-up Dates'),
    ...(output.follow_up_dates && output.follow_up_dates.length
      ? output.follow_up_dates.map(f => bullet(f))
      : [body('No follow-up dates mentioned.')]),
    new Paragraph({ children: [new TextRun('')], spacing: { before: 480 } }),
    new Paragraph({ children: [new TextRun({ text: 'Built by A H Ashik Ahmed · linkedin.com/in/ashikahmed11 · github.com/ashikdip', size: 18, color: '636363', italics: true })] }),
  ];

  const doc = new Document({ sections: [{ children }] });
  Packer.toBlob(doc).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = getFilename('docx'); a.click();
    URL.revokeObjectURL(url);
  });
}

function exportPdf(output, meetingType) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, L = 16, R = 194, CW = R - L;
  let y = 0;

  /* ── COLOURS ── */
  const PRIMARY  = [2, 74, 216];
  const INK      = [26, 26, 26];
  const CHARCOAL = [61, 61, 61];
  const GRAPHITE = [99, 99, 99];
  const CLOUD    = [247, 247, 247];
  const FOG      = [232, 232, 232];
  const WHITE    = [255, 255, 255];
  const STATUS_C = { confirmed: [2,74,216], pending: [179,38,43], deferred: [99,99,99] };
  const STATUS_BG = { confirmed: [201,224,252], pending: [249,212,210], deferred: [232,232,232] };

  /* ── HELPERS ── */
  const newPage = () => { doc.addPage(); y = 28; };
  const check = (h = 10) => { if (y + h > 276) newPage(); };

  const secHead = (title) => {
    check(14);
    y += 4;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8.5);
    doc.setTextColor(...GRAPHITE);
    doc.text(title.toUpperCase(), L, y);
    y += 2;
    doc.setDrawColor(...PRIMARY);
    doc.setLineWidth(0.5);
    doc.line(L, y, R, y);
    y += 5;
  };

  const badge = (status, x, bY) => {
    const label = (status || 'pending').toUpperCase();
    const bg = STATUS_BG[status] || STATUS_BG.deferred;
    const fg = STATUS_C[status] || STATUS_C.deferred;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    const tw = doc.getTextWidth(label);
    const pw = tw + 4, ph = 4.5;
    doc.setFillColor(...bg);
    doc.roundedRect(x, bY - 3.5, pw, ph, 1, 1, 'F');
    doc.setTextColor(...fg);
    doc.text(label, x + 2, bY);
    return pw + 3;
  };

  /* ══ HEADER BAND ══════════════════════════════════════════════ */
  doc.setFillColor(...PRIMARY);
  doc.rect(0, 0, W, 28, 'F');

  // Double-slash motif
  const slash = (sx) => {
    doc.setFillColor(...WHITE);
    doc.setDrawColor(...WHITE);
    const pts = [[sx, 6], [sx+3, 6], [sx+1, 22], [sx-2, 22]];
    // Draw as filled polygon using lines
    doc.setLineWidth(0);
    // Use triangle approximation
    doc.triangle(pts[0][0], pts[0][1], pts[1][0], pts[1][1], pts[2][0], pts[2][1], 'F');
    doc.triangle(pts[0][0], pts[0][1], pts[2][0], pts[2][1], pts[3][0], pts[3][1], 'F');
  };
  slash(L);
  slash(L + 6);

  // Title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(15);
  doc.setTextColor(...WHITE);
  doc.text('Claims Meeting Summary', L + 16, 13);

  // Subtitle
  const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(201, 224, 252);
  doc.text(meetingType + '  ·  ' + dateStr, L + 16, 21);

  y = 38;

  /* ══ SUMMARY ════════════════════════════════════════════════ */
  secHead('Summary');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(...CHARCOAL);
  const sumLines = doc.splitTextToSize(output.summary, CW);
  sumLines.forEach(l => { check(6); doc.text(l, L, y); y += 5; });
  y += 4;

  /* ══ DECISIONS ══════════════════════════════════════════════ */
  secHead('Decisions');
  if (!output.decisions || !output.decisions.length) {
    doc.setFont('helvetica', 'italic'); doc.setFontSize(9); doc.setTextColor(...GRAPHITE);
    doc.text('No decisions recorded.', L, y); y += 8;
  } else {
    output.decisions.forEach(d => {
      const textWidth = CW - 28;
      const dlines = doc.splitTextToSize(d.decision, textWidth);
      const rowH = Math.max(dlines.length * 5, 7) + 4;
      check(rowH);

      // Row background
      doc.setFillColor(...CLOUD);
      doc.roundedRect(L, y - 4, CW, rowH, 1.5, 1.5, 'F');

      // Badge
      const bw = badge(d.status, L + 2, y);

      // Decision text
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9.5);
      doc.setTextColor(...INK);
      dlines.forEach((l, i) => doc.text(l, L + 2 + bw, y + i * 5));

      y += rowH + 2;
    });
  }
  y += 4;

  /* ══ ACTION ITEMS ═══════════════════════════════════════════ */
  secHead('Action Items');
  if (!output.action_items || !output.action_items.length) {
    doc.setFont('helvetica', 'italic'); doc.setFontSize(9); doc.setTextColor(...GRAPHITE);
    doc.text('No action items recorded.', L, y); y += 8;
  } else {
    const C1 = L, C2 = L + 92, C3 = L + 142;
    const COL_W = [88, 46, CW - 142 + L];

    // Table header
    doc.setFillColor(...INK);
    doc.rect(L, y - 4, CW, 8, 'F');
    doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); doc.setTextColor(...WHITE);
    doc.text('TASK', C1 + 2, y);
    doc.text('OWNER', C2 + 2, y);
    doc.text('DUE DATE', C3 + 2, y);
    y += 6;

    output.action_items.forEach((a, i) => {
      const tlines = doc.splitTextToSize(a.task, COL_W[0] - 4);
      const rowH = Math.max(tlines.length * 4.8, 6) + 4;
      check(rowH);

      // Alternating rows
      if (i % 2 === 0) { doc.setFillColor(...CLOUD); doc.rect(L, y - 3, CW, rowH, 'F'); }

      // Task
      doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(...CHARCOAL);
      tlines.forEach((l, j) => doc.text(l, C1 + 2, y + j * 4.8));

      // Owner badge
      const ow = a.owner || 'Unassigned';
      doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
      const oww = doc.getTextWidth(ow) + 5;
      doc.setFillColor(...STATUS_BG.confirmed);
      doc.roundedRect(C2 + 1, y - 3.2, oww, 5, 1, 1, 'F');
      doc.setTextColor(...PRIMARY);
      doc.text(ow, C2 + 3, y);

      // Due date
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...GRAPHITE);
      doc.text(a.due_date, C3 + 2, y);

      y += rowH;
    });

    // Table bottom border
    doc.setDrawColor(...FOG); doc.setLineWidth(0.3); doc.line(L, y, R, y);
  }
  y += 6;

  /* ══ FOLLOW-UP DATES ════════════════════════════════════════ */
  secHead('Follow-up Dates');
  if (!output.follow_up_dates || !output.follow_up_dates.length) {
    doc.setFont('helvetica', 'italic'); doc.setFontSize(9); doc.setTextColor(...GRAPHITE);
    doc.text('No follow-up dates mentioned.', L, y); y += 8;
  } else {
    const chips = output.follow_up_dates;
    let cx = L;
    chips.forEach(f => {
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
      const fw = doc.getTextWidth(f) + 8;
      if (cx + fw > R) { cx = L; y += 8; }
      check(8);
      doc.setFillColor(...CLOUD);
      doc.setDrawColor(...FOG);
      doc.setLineWidth(0.3);
      doc.roundedRect(cx, y - 3.5, fw, 5.5, 1.5, 1.5, 'FD');
      doc.setTextColor(...INK);
      doc.text(f, cx + 4, y);
      cx += fw + 3;
    });
    y += 10;
  }

  /* ══ FOOTER ═════════════════════════════════════════════════ */
  const pages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setFillColor(...CLOUD);
    doc.rect(0, 284, W, 13, 'F');
    doc.setDrawColor(...FOG); doc.setLineWidth(0.3); doc.line(0, 284, W, 284);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(...GRAPHITE);
    doc.text('Built by A H Ashik Ahmed  ·  linkedin.com/in/ashikahmed11  ·  github.com/ashikdip', L, 290);
    doc.setFont('helvetica', 'bold');
    doc.text('Page ' + i + ' of ' + pages, R, 290, { align: 'right' });
  }

  doc.save(getFilename('pdf'));
}

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "40px 24px 80px" }}>

        {/* API KEY */}
        <div style={{ background: C.cloud, borderRadius: R.xl, padding: 24, marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <Eyebrow>API Key</Eyebrow>
            {providerLabel && (
              <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 10px", borderRadius: R.pill, background: providerBg, color: providerColor, border: `1px solid ${providerColor}` }}>
                {providerLabel}
              </span>
            )}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input
              type={showKey ? "text" : "password"}
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              placeholder="Paste Anthropic (sk-ant-...) or Google Gemini API key"
              style={{ ...inputBase, flex: 1, background: C.canvas }}
            />
            <button onClick={() => setShowKey(!showKey)} style={{ background: C.canvas, color: C.charcoal, border: `1px solid ${C.steel}`, borderRadius: R.md, padding: "0 16px", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
              {showKey ? "Hide" : "Show"}
            </button>
          </div>
          <p style={{ fontSize: 11, color: C.graphite, marginTop: 6 }}>
            Session only, never stored. Only Anthropic (sk-ant-...) or Google Gemini API keys will work. Provider is detected automatically from the key prefix.
          </p>
        </div>

        {/* MEETING TYPE */}
        <Card style={{ marginBottom: 20 }}>
          <Eyebrow>Meeting Type</Eyebrow>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {Object.entries(TYPES).map(([key, val]) => {
              const active = type === key;
              return (
                <button key={key} onClick={() => setType(key)} style={{
                  padding: "8px 22px", borderRadius: R.pill, cursor: "pointer",
                  background: active ? C.ink : C.canvas, color: active ? C.onInk : C.ink,
                  border: `1.5px solid ${active ? C.ink : C.steel}`,
                  fontSize: 14, fontWeight: 500, fontFamily: "inherit", transition: "all .15s"
                }}>{val.label}</button>
              );
            })}
          </div>
        </Card>

        {/* TRANSCRIPT */}
        <Card style={{ marginBottom: 20 }}>
          <Eyebrow>Meeting Transcript</Eyebrow>
          <textarea
            value={transcript}
            onChange={e => setTranscript(e.target.value)}
            placeholder="Paste the meeting transcript here. Plain text, no special formatting needed."
            rows={11}
            style={{ ...inputBase, resize: "vertical", lineHeight: 1.65 }}
          />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 14 }}>
            <span style={{ fontSize: 12, color: C.graphite }}>{words} {words === 1 ? "word" : "words"}</span>
            <button onClick={run} disabled={loading} style={{
              height: 44, padding: "0 32px", borderRadius: R.md, border: "none",
              background: loading ? "#5a85f0" : C.primary, color: C.onInk,
              fontSize: 14, fontWeight: 600, letterSpacing: "0.7px", textTransform: "uppercase",
              cursor: loading ? "wait" : "pointer", fontFamily: "inherit",
              display: "flex", alignItems: "center", gap: 10, transition: "background .2s"
            }}>
              {loading ? <><span style={{ width: 14, height: 14, border: "2px solid rgba(255,255,255,0.3)", borderTopColor: "#fff", borderRadius: "50%", display: "inline-block", animation: "spin 0.7s linear infinite" }} /> Analysing</> : "Summarise Meeting"}
            </button>
          </div>
        </Card>

        {error && <div style={{ background: "#fff0f0", border: `1px solid ${C.bloomCoral}`, borderRadius: R.lg, padding: "12px 16px", color: "#b3262b", fontSize: 13, fontWeight: 500, marginBottom: 20 }}>{error}</div>}

        {output && <>
          <Card style={{ marginBottom: 20 }}>
            <SectionHead label="Summary" copyText={output.summary} />
            <p style={{ fontSize: 15, lineHeight: 1.7, color: C.charcoal, margin: 0 }}>{output.summary}</p>
          </Card>

          <Card style={{ marginBottom: 20 }}>
            <SectionHead label="Decisions" count={(output.decisions||[]).length} copyText={(output.decisions||[]).map(d=>`[${d.status?.toUpperCase()}] ${d.decision}`).join("\n")} />
            {!(output.decisions||[]).length
              ? <p style={{ color: C.graphite, fontSize: 13, margin: 0 }}>No decisions recorded.</p>
              : <div style={{ display: "grid", gap: 8 }}>
                  {output.decisions.map((d, i) => {
                    const s = STATUS[d.status] || STATUS.pending;
                    return (
                      <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "12px 16px", background: C.cloud, borderRadius: R.lg }}>
                        <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 10px", borderRadius: R.pill, whiteSpace: "nowrap", background: s.bg, color: s.color, border: `1px solid ${s.border}`, letterSpacing: "0.06em", textTransform: "uppercase", marginTop: 2 }}>{s.label}</span>
                        <span style={{ fontSize: 14, color: C.ink, lineHeight: 1.55 }}>{d.decision}</span>
                      </div>
                    );
                  })}
                </div>
            }
          </Card>

          <Card style={{ marginBottom: 20 }}>
            <SectionHead label="Action Items" count={(output.action_items||[]).length} copyText={(output.action_items||[]).map(a=>`${a.task} - ${a.owner} (${a.due_date})`).join("\n")} />
            {!(output.action_items||[]).length
              ? <p style={{ color: C.graphite, fontSize: 13, margin: 0 }}>No action items recorded.</p>
              : <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                  <thead>
                    <tr style={{ borderBottom: `1px solid ${C.fog}` }}>
                      {["Task", "Owner", "Due Date"].map(h => <th key={h} style={{ textAlign: "left", padding: "6px 12px 12px", fontSize: 11, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase", color: C.graphite }}>{h}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {output.action_items.map((a, i) => (
                      <tr key={i} style={{ borderBottom: i < output.action_items.length - 1 ? `1px solid ${C.cloud}` : "none" }}>
                        <td style={{ padding: "12px 12px", color: C.ink, lineHeight: 1.45 }}>{a.task}</td>
                        <td style={{ padding: "12px 12px", whiteSpace: "nowrap" }}>
                          <span style={{ background: C.primarySoft, color: C.primary, borderRadius: R.pill, padding: "3px 12px", fontSize: 12, fontWeight: 600 }}>{a.owner || "Unassigned"}</span>
                        </td>
                        <td style={{ padding: "12px 12px", color: C.graphite, fontSize: 12, whiteSpace: "nowrap" }}>{a.due_date}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
            }
          </Card>

          <Card style={{ marginBottom: 28 }}>
            <SectionHead label="Follow-up Dates" copyText={(output.follow_up_dates||[]).join("\n")} />
            {!(output.follow_up_dates||[]).length
              ? <p style={{ color: C.graphite, fontSize: 13, margin: 0 }}>No follow-up dates mentioned.</p>
              : <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {output.follow_up_dates.map((f, i) => <span key={i} style={{ background: C.cloud, color: C.ink, border: `1px solid ${C.fog}`, borderRadius: R.pill, padding: "6px 18px", fontSize: 13, fontWeight: 500 }}>{f}</span>)}
                </div>
            }
          </Card>

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, flexWrap: "wrap" }}>
            <button onClick={() => { navigator.clipboard.writeText(allText); setAllCopied(true); setTimeout(()=>setAllCopied(false),1800); }} style={{
              height: 44, padding: "0 22px", borderRadius: R.md, fontFamily: "inherit",
              background: allCopied ? C.ink : C.canvas, color: allCopied ? C.onInk : C.ink,
              border: `1.5px solid ${allCopied ? C.ink : C.steel}`,
              fontSize: 13, fontWeight: 600, letterSpacing: "0.6px", textTransform: "uppercase",
              cursor: "pointer", transition: "all .2s"
            }}>{allCopied ? "Copied" : "Copy Text"}</button>
            <button onClick={() => { setDocxBusy(true); exportDocx(output, TYPES[type].label); setTimeout(()=>setDocxBusy(false),1500); }} style={{
              height: 44, padding: "0 22px", borderRadius: R.md, fontFamily: "inherit",
              background: C.primary, color: C.onInk, border: "none",
              fontSize: 13, fontWeight: 600, letterSpacing: "0.6px", textTransform: "uppercase",
              cursor: docxBusy ? "wait" : "pointer", opacity: docxBusy ? 0.7 : 1, transition: "all .2s"
            }}>{docxBusy ? "Generating..." : "Export DOCX"}</button>
            <button onClick={() => { setPdfBusy(true); exportPdf(output, TYPES[type].label); setTimeout(()=>setPdfBusy(false),1500); }} style={{
              height: 44, padding: "0 22px", borderRadius: R.md, fontFamily: "inherit",
              background: C.ink, color: C.onInk, border: "none",
              fontSize: 13, fontWeight: 600, letterSpacing: "0.6px", textTransform: "uppercase",
              cursor: pdfBusy ? "wait" : "pointer", opacity: pdfBusy ? 0.7 : 1, transition: "all .2s"
            }}>{pdfBusy ? "Generating..." : "Export PDF"}</button>
          </div>
        </>}
      </div>

      {/* FOOTER */}
      <div style={{ background: C.ink, padding: "40px 32px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.onInk, marginBottom: 6 }}>Claims Meeting Summariser</div>
              <div style={{ fontSize: 11, color: C.steel }}>Nordic Claims Unit · If Insurance · AI Centre of Excellence</div>
            </div>
            <div style={{ flex: 1, textAlign: "right" }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.onInk, marginBottom: 6 }}>Built by A H Ashik Ahmed</div>
              <div style={{ fontSize: 11, color: C.steel }}>
                <a href="https://www.linkedin.com/in/ashikahmed11/" target="_blank" rel="noreferrer" style={{ color: "#5a85f0", textDecoration: "none" }}>linkedin.com/in/ashikahmed11</a>
                {" · "}
                <a href="https://github.com/ashikdip" target="_blank" rel="noreferrer" style={{ color: "#5a85f0", textDecoration: "none" }}>github.com/ashikdip</a>
              </div>
            </div>
          </div>
          <div style={{ borderTop: "1px solid #2e2e2e", paddingTop: 16, display: "flex", justifyContent: "space-between", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.steel }}>Supports Anthropic Claude and Google Gemini · Session data is not stored</span>
            <span style={{ fontSize: 11, color: C.steel }}>v1.3 · Internal Preview</span>
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
